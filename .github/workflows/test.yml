name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [15, 16, 17, 18]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Test channels on PostgreSQL ${{ matrix.pg_version }}
        run: ./test.sh ${{ matrix.pg_version }}

  packages:
    name: Build channel packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build bundle + dbdev package and verify
        run: |
          scripts/build_install_bundle.sh pgpm_core/install.sql dist/pg_partition_magician-bundle.sql
          scripts/build_dbdev_package.sh  pgpm_core/install.sql dist/pg_partition_magician--0.1.0.sql
          # bundle must be free of psql metacommands (dashboard SQL editor target)
          if grep -nE '^\\' dist/pg_partition_magician-bundle.sql dist/pg_partition_magician--0.1.0.sql; then
            echo "ERROR: a package still contains psql metacommands"; exit 1
          fi

  # The from_hypertable / TimescaleDB track, a first-class member of the default suite. It runs on a separate
  # image (Apache TimescaleDB on supabase/postgres, PG15) so it lives in its own reusable workflow rather than
  # the PG-version matrix above; calling it here makes it run on every push/PR alongside the matrix.
  timescale:
    name: TimescaleDB track
    uses: ./.github/workflows/timescale.yml

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, packages, timescale]
    if: always()
    steps:
      - run: |
          [ "${{ needs.test.result }}" = "success" ] || { echo "matrix tests failed"; exit 1; }
          [ "${{ needs.packages.result }}" = "success" ] || { echo "package build failed"; exit 1; }
          [ "${{ needs.timescale.result }}" = "success" ] || { echo "from_hypertable (TimescaleDB) track failed"; exit 1; }
          echo "All tests, the TimescaleDB track, and package builds passed."
