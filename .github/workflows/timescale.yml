name: TimescaleDB track

# The from_hypertable migration track. Separate from the main matrix: it needs a TimescaleDB image
# (its own Dockerfile), is PG15-only, and is pinned to the Supabase fleet version (TimescaleDB 2.16.1).
# Path-filtered so it runs only when the migration code, its tests, or the harness change.
on:
  push:
    branches: [ main ]
    paths:
      - 'sql/from_hypertable.sql'
      - 'sql/pg_partition_magician.sql'
      - 'tests/timescale/**'
      - 'test.sh'
      - 'docker-compose.yml'
      - '.github/workflows/timescale.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sql/from_hypertable.sql'
      - 'sql/pg_partition_magician.sql'
      - 'tests/timescale/**'
      - 'test.sh'
      - 'docker-compose.yml'
      - '.github/workflows/timescale.yml'
  workflow_dispatch:

jobs:
  timescale:
    name: from_hypertable on TimescaleDB ${{ matrix.ts_version }} / PG15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # the two big Supabase fleet clusters (2.9.1: ~224 projects, 2.16.1: ~434)
        ts_version: ['2.9.1', '2.16.1']
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Run the from_hypertable track
        run: TS_VERSIONS='${{ matrix.ts_version }}' ./test.sh timescale
