name: TimescaleDB track

# The from_hypertable migration track. Separate from the main matrix: it needs a TimescaleDB image, is
# PG15-only, and runs on the Supabase fleet image (public.ecr.aws/supabase/postgres) -- the Apache edition
# the migration actually targets. TS_PG_TAG selects the image tag; the default 15.14.1.127 bundles
# TimescaleDB 2.16.1 (the larger fleet cluster, ~434 projects). The 2.9.x cluster (~224 projects) is not
# covered here yet: the image bundles one TS version per tag, so a 2.9.x leg needs a supabase/postgres:15
# tag that ships TimescaleDB 2.9.1 (deferred; tracked in the PR that introduced this).
# Path-filtered so it runs only when the migration code, its tests, or the harness change.
on:
  push:
    branches: [ main ]
    paths:
      - 'pgpm_hypertable/install.sql'
      - 'pgpm_core/install.sql'
      - 'tests/timescale/**'
      - 'test.sh'
      - 'docker-compose.yml'
      - '.github/workflows/timescale.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'pgpm_hypertable/install.sql'
      - 'pgpm_core/install.sql'
      - 'tests/timescale/**'
      - 'test.sh'
      - 'docker-compose.yml'
      - '.github/workflows/timescale.yml'
  workflow_dispatch:

jobs:
  timescale:
    name: from_hypertable on Apache TimescaleDB (supabase/postgres) / PG15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the from_hypertable track
        run: TS_PG_TAGS='15.14.1.127' ./test.sh timescale
