x-pg-base: &pg-base
  environment:
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
  # default /dev/shm is 64MB; too small for parallel scans/VACUUM on a large
  # bench table (managed instances have ample shm, this only matters in Docker)
  shm_size: "1gb"
  # mount the repo read-only so the harness can psql -f the source, the
  # migrations (fixtures), built bundles, and pg_prove the tests.
  volumes:
    - .:/repo:ro
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 5s
    timeout: 5s
    retries: 10

services:
  postgres15:
    <<: *pg-base
    profiles: ["pg15", "all"]
    build: { context: ., args: { PG_VERSION: 15 } }
    image: pgpm_test:15
    container_name: pgpm_test-15
    ports: ["5515:5432"]

  postgres16:
    <<: *pg-base
    profiles: ["pg16", "all"]
    build: { context: ., args: { PG_VERSION: 16 } }
    image: pgpm_test:16
    container_name: pgpm_test-16
    ports: ["5516:5432"]

  postgres17:
    <<: *pg-base
    profiles: ["pg17", "all"]
    build: { context: ., args: { PG_VERSION: 17 } }
    image: pgpm_test:17
    container_name: pgpm_test-17
    ports: ["5517:5432"]

  postgres18:
    <<: *pg-base
    profiles: ["pg18", "all"]
    build: { context: ., args: { PG_VERSION: 18 } }
    image: pgpm_test:18
    container_name: pgpm_test-18
    ports: ["5518:5432"]

  # The from_hypertable track: PG15 + Apache TimescaleDB, on the Supabase fleet image
  # (public.ecr.aws/supabase/postgres). That is the edition the migration actually targets, and it ships
  # timescaledb (Apache), pgTAP, and the timescaledb shared_preload preloaded -- so no build step is needed.
  # TS_PG_TAG (set by `./test.sh timescale`) selects the image tag; default 15.14.1.127 bundles TimescaleDB
  # 2.16.1. Excluded from the default 15/16/17/18 matrix (its own profile, never "all").
  timescale:
    <<: *pg-base
    profiles: ["timescale"]
    image: public.ecr.aws/supabase/postgres:${TS_PG_TAG:-15.14.1.127}
    container_name: pgpm_test-timescale
    # Override pg-base's environment: the supabase/postgres image bootstraps its own superuser
    # (supabase_admin) and a postgres role, and its first-boot migrate.sh connects AS supabase_admin --
    # so setting POSTGRES_USER=postgres (as pg-base does) makes that role the superuser instead, and
    # migrate.sh fails ("role supabase_admin does not exist") and the container exits. Pass only the
    # password; the image still creates the `postgres` role the harness connects with.
    environment:
      POSTGRES_PASSWORD: postgres
    ports: ["5519:5432"]
