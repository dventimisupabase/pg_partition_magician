x-pg-base: &pg-base
  environment:
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
  # default /dev/shm is 64MB; too small for parallel scans/VACUUM on a large
  # bench table (managed instances have ample shm, this only matters in Docker)
  shm_size: "1gb"
  # mount the repo read-only so the harness can psql -f the source, the
  # migrations (fixtures), built bundles, and pg_prove the tests.
  volumes:
    - .:/repo:ro
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 5s
    timeout: 5s
    retries: 10

services:
  postgres15:
    <<: *pg-base
    profiles: ["pg15", "all"]
    build: { context: ., args: { PG_VERSION: 15 } }
    image: pgpm_test:15
    container_name: pgpm_test-15
    ports: ["5515:5432"]

  postgres16:
    <<: *pg-base
    profiles: ["pg16", "all"]
    build: { context: ., args: { PG_VERSION: 16 } }
    image: pgpm_test:16
    container_name: pgpm_test-16
    ports: ["5516:5432"]

  postgres17:
    <<: *pg-base
    profiles: ["pg17", "all"]
    build: { context: ., args: { PG_VERSION: 17 } }
    image: pgpm_test:17
    container_name: pgpm_test-17
    ports: ["5517:5432"]

  postgres18:
    <<: *pg-base
    profiles: ["pg18", "all"]
    build: { context: ., args: { PG_VERSION: 18 } }
    image: pgpm_test:18
    container_name: pgpm_test-18
    ports: ["5518:5432"]

  # The from_hypertable track: TimescaleDB on PG15. TS_VERSION (set per-version by `./test.sh timescale`)
  # selects the Supabase fleet version to build/run; defaults to 2.16.1. Built from a separate Dockerfile
  # (Alpine base + pgTAP), excluded from the default 15/16/17/18 matrix (its own profile, never "all").
  timescale:
    <<: *pg-base
    profiles: ["timescale"]
    build:
      context: .
      dockerfile: tests/timescale/Dockerfile
      args:
        TS_VERSION: ${TS_VERSION:-2.16.1}
    image: pgpm_test:timescale-${TS_VERSION:-2.16.1}
    container_name: pgpm_test-timescale
    ports: ["5519:5432"]
